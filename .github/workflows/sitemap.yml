name: Génération automatique Sitemap

on:
  push:
    branches:
      - main

jobs:
  sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate sitemap
        run: node generate-sitemap.js

      - name: Commit sitemap
        run: |
          git config --global user.name "Miternique Bot"
          git config --global user.email "actions@github.com"

          git add sitemap.xml

          git diff --staged --quiet || git commit -m "Automatic sitemap update"

          git push
