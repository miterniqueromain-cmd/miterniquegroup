name: Génération automatique Sitemap

on:
  push:
    branches:
      - main
      - master

jobs:
  sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Génération du sitemap
        run: node generate-sitemap.js

      - name: Commit du sitemap mis à jour
        run: |
          git config --global user.name "Miternique Bot"
          git config --global user.email "actions@github.com"

          git add sitemap.xml

          git diff --staged --quiet || git commit -m "Mise à jour automatique sitemap"

          git push
