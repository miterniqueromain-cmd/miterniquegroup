name: Generate Robots

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  robots:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate robots.txt
        run: |
          echo "User-agent: *" > robots.txt
          echo "Allow: /" >> robots.txt
          echo "" >> robots.txt
          echo "Sitemap: https://www.miterniquegroup.com/sitemap.xml" >> robots.txt

      - name: Commit robots
        run: |
          git config --global user.name "Miternique Bot"
          git config --global user.email "actions@github.com"

          git add robots.txt

          git diff --staged --quiet || git commit -m "Update robots"

          git push
